// amplifier-core/proto/amplifier_module.proto
syntax = "proto3";
package amplifier.module;

// Universal contract for tool modules in any language.
// Implement this service to create an Amplifier tool in Go, TypeScript, C#, etc.
service ToolService {
  // Return the tool's name, description, and JSON Schema parameters.
  rpc GetSpec(Empty) returns (ToolSpec);

  // Execute the tool with JSON (or MessagePack) input.
  rpc Execute(ToolExecuteRequest) returns (ToolExecuteResponse);
}

message Empty {}

message ToolSpec {
  string name = 1;
  string description = 2;
  // JSON Schema describing the tool's input parameters, as a JSON string.
  string parameters_json = 3;
}

message ToolExecuteRequest {
  // Serialized input payload (default: JSON, future: MessagePack).
  bytes input = 1;
  // MIME type: "application/json" (default if empty) or "application/msgpack".
  string content_type = 2;
}

message ToolExecuteResponse {
  bool success = 1;
  // Serialized output payload.
  bytes output = 2;
  // MIME type of output (mirrors request content_type).
  string content_type = 3;
  // Error message if success is false.
  string error = 4;
}

// ---------------------------------------------------------------------------
// Common enums
// ---------------------------------------------------------------------------

enum ModuleType {
  MODULE_TYPE_UNSPECIFIED = 0;
  MODULE_TYPE_PROVIDER    = 1;
  MODULE_TYPE_TOOL        = 2;
  MODULE_TYPE_HOOK        = 3;
  MODULE_TYPE_MEMORY      = 4;
  MODULE_TYPE_GUARDRAIL   = 5;
  MODULE_TYPE_APPROVAL    = 6;
}

enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_SERVING     = 1;
  HEALTH_STATUS_NOT_SERVING = 2;
  HEALTH_STATUS_UNKNOWN     = 3;
}

enum ConfigFieldType {
  CONFIG_FIELD_TYPE_UNSPECIFIED = 0;
  CONFIG_FIELD_TYPE_STRING      = 1;
  CONFIG_FIELD_TYPE_NUMBER      = 2;
  CONFIG_FIELD_TYPE_BOOLEAN     = 3;
  CONFIG_FIELD_TYPE_SECRET      = 4;
}

// ---------------------------------------------------------------------------
// Module lifecycle messages
// ---------------------------------------------------------------------------

message ModuleInfo {
  string id                = 1;
  string name              = 2;
  string version           = 3;
  ModuleType module_type   = 4;
  string mount_point       = 5;
  string description       = 6;
  string config_schema_json = 7;
  repeated string capabilities = 8;
  string author            = 9;
}

message MountRequest {
  map<string, string> config = 1;
  string module_id           = 2;
}

message MountResponse {
  bool success         = 1;
  string error         = 2;
  HealthStatus status  = 3;
}

message HealthCheckResponse {
  HealthStatus status = 1;
  string message      = 2;
}

message ConfigField {
  string id                     = 1;
  string display_name           = 2;
  ConfigFieldType field_type    = 3;
  string prompt                 = 4;
  string env_var                = 5;
  repeated string choices       = 6;
  bool required                 = 7;
  string default_value          = 8;
  map<string, string> show_when = 9;
  bool requires_model           = 10;
}

// ---------------------------------------------------------------------------
// Error taxonomy
// ---------------------------------------------------------------------------

enum ProviderErrorType {
  PROVIDER_ERROR_TYPE_UNSPECIFIED     = 0;
  PROVIDER_ERROR_TYPE_AUTH            = 1;
  PROVIDER_ERROR_TYPE_RATE_LIMIT      = 2;
  PROVIDER_ERROR_TYPE_CONTEXT_LENGTH  = 3;
  PROVIDER_ERROR_TYPE_INVALID_REQUEST = 4;
  PROVIDER_ERROR_TYPE_CONTENT_FILTER  = 5;
  PROVIDER_ERROR_TYPE_UNAVAILABLE     = 6;
  PROVIDER_ERROR_TYPE_TIMEOUT         = 7;
  PROVIDER_ERROR_TYPE_OTHER           = 8;
}

enum ToolErrorType {
  TOOL_ERROR_TYPE_UNSPECIFIED = 0;
  TOOL_ERROR_TYPE_EXECUTION   = 1;
  TOOL_ERROR_TYPE_VALIDATION  = 2;
  TOOL_ERROR_TYPE_TIMEOUT     = 3;
}

enum HookErrorType {
  HOOK_ERROR_TYPE_UNSPECIFIED = 0;
  HOOK_ERROR_TYPE_EXECUTION   = 1;
  HOOK_ERROR_TYPE_VALIDATION  = 2;
  HOOK_ERROR_TYPE_TIMEOUT     = 3;
}

message ProviderError {
  ProviderErrorType error_type = 1;
  string message               = 2;
  string provider_name         = 3;
  string model                 = 4;
  int32 status_code            = 5;
  bool retryable               = 6;
  double retry_after            = 7;
}

message ToolError {
  ToolErrorType error_type = 1;
  string message           = 2;
  string tool_name         = 3;
  string stdout            = 4;
  string stderr            = 5;
  int32 exit_code          = 6;
}

message HookError {
  HookErrorType error_type = 1;
  string message           = 2;
  string hook_name         = 3;
}

message AmplifierError {
  oneof error {
    ProviderError provider_error = 1;
    ToolError tool_error         = 2;
    HookError hook_error         = 3;
    string generic_error         = 4;
    string validation_error      = 5;
  }
}

// ---------------------------------------------------------------------------
// LLM conversation types
// ---------------------------------------------------------------------------

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_SYSTEM      = 1;
  ROLE_USER        = 2;
  ROLE_ASSISTANT   = 3;
  ROLE_TOOL        = 4;
  ROLE_FUNCTION    = 5;
  ROLE_DEVELOPER   = 6;
}

enum Visibility {
  VISIBILITY_UNSPECIFIED = 0;
  VISIBILITY_ALL         = 1;
  VISIBILITY_LLM_ONLY    = 2;
  VISIBILITY_USER_ONLY   = 3;
}

// --- Content block types ---

message TextBlock {
  string text = 1;
}

message ThinkingBlock {
  string thinking  = 1;
  string signature = 2;
  string content   = 3;
}

message RedactedThinkingBlock {
  string data = 1;
}

message ToolCallBlock {
  string id         = 1;
  string name       = 2;
  string input_json = 3;
}

message ToolResultBlock {
  string tool_call_id = 1;
  string output_json  = 2;
}

message ImageBlock {
  // MIME type of the image: "image/png", "image/jpeg", "image/gif", "image/webp".
  string media_type  = 1;
  bytes  data        = 2;
  string source_json = 3;
}

message ReasoningBlock {
  repeated string content = 1;
  repeated string summary = 2;
}

message ContentBlock {
  oneof block {
    TextBlock             text_block              = 1;
    ThinkingBlock         thinking_block          = 2;
    RedactedThinkingBlock redacted_thinking_block = 3;
    ToolCallBlock         tool_call_block         = 4;
    ToolResultBlock       tool_result_block       = 5;
    ImageBlock            image_block             = 6;
    ReasoningBlock        reasoning_block         = 7;
  }
  Visibility visibility = 8;
}

message ContentBlockList {
  repeated ContentBlock blocks = 1;
}

// --- Conversation message ---

message Message {
  Role role = 1;
  oneof content {
    string           text_content  = 2;
    ContentBlockList block_content = 3;
  }
  string name          = 4;
  string tool_call_id  = 5;
  string metadata_json = 6;
}

// --- Tool specifications and calls ---

message ToolCallMessage {
  string id             = 1;
  string name           = 2;
  string arguments_json = 3;
}

message ToolSpecProto {
  string name            = 1;
  string description     = 2;
  string parameters_json = 3;
}

// --- Response format ---

message JsonSchemaFormat {
  string schema_json = 1;
  bool   strict      = 2;
}

message ResponseFormat {
  oneof format {
    bool             text        = 1;
    bool             json        = 2;
    JsonSchemaFormat  json_schema = 3;
  }
}

// --- Token usage and degradation ---

message Usage {
  int32 prompt_tokens                    = 1;
  int32 completion_tokens                = 2;
  int32 total_tokens                     = 3;
  optional int32 reasoning_tokens        = 4;
  optional int32 cache_read_tokens       = 5;
  optional int32 cache_creation_tokens   = 6;
}

message Degradation {
  string requested = 1;
  string actual    = 2;
  string reason    = 3;
}

// --- Chat request and response ---

message ChatRequest {
  repeated Message       messages          = 1;
  repeated ToolSpecProto tools             = 2;
  ResponseFormat         response_format   = 3;
  double                 temperature       = 4;
  double                 top_p             = 5;
  int32                  max_output_tokens = 6;
  string                 conversation_id   = 7;
  bool                   stream            = 8;
  string                 metadata_json     = 9;
  string                 model             = 10;
  // Tool selection mode: "auto", "none", "required", or a specific tool name.
  string                 tool_choice       = 11;
  repeated string        stop              = 12;
  // Model reasoning effort: "low", "medium", or "high".
  string                 reasoning_effort  = 13;
  double                 timeout           = 14;
}

message ChatResponse {
  string                    content       = 1;
  repeated ToolCallMessage  tool_calls    = 2;
  Usage                     usage         = 3;
  Degradation               degradation   = 4;
  // Completion stop reason: "stop", "tool_calls", "length", "content_filter".
  string                    finish_reason = 5;
  string                    metadata_json = 6;
}

// ---------------------------------------------------------------------------
// Module-specific enums
// ---------------------------------------------------------------------------

enum HookAction {
  HOOK_ACTION_UNSPECIFIED    = 0;
  HOOK_ACTION_CONTINUE       = 1;
  HOOK_ACTION_MODIFY         = 2;
  HOOK_ACTION_DENY           = 3;
  HOOK_ACTION_INJECT_CONTEXT = 4;
  HOOK_ACTION_ASK_USER       = 5;
}

enum ContextInjectionRole {
  CONTEXT_INJECTION_ROLE_UNSPECIFIED = 0;
  CONTEXT_INJECTION_ROLE_SYSTEM     = 1;
  CONTEXT_INJECTION_ROLE_USER       = 2;
  CONTEXT_INJECTION_ROLE_ASSISTANT  = 3;
}

enum ApprovalDefault {
  APPROVAL_DEFAULT_UNSPECIFIED = 0;
  APPROVAL_DEFAULT_APPROVE    = 1;
  APPROVAL_DEFAULT_DENY       = 2;
}

enum UserMessageLevel {
  USER_MESSAGE_LEVEL_UNSPECIFIED = 0;
  USER_MESSAGE_LEVEL_INFO       = 1;
  USER_MESSAGE_LEVEL_WARNING    = 2;
  USER_MESSAGE_LEVEL_ERROR      = 3;
}

// ---------------------------------------------------------------------------
// Module-specific messages
// ---------------------------------------------------------------------------

message ToolResult {
  bool   success     = 1;
  string output_json = 2;
  string error_json  = 3;
}

message HookResult {
  HookAction           action                     = 1;
  string               data_json                  = 2;
  string               reason                     = 3;
  string               context_injection          = 4;
  ContextInjectionRole context_injection_role      = 5;
  bool                 ephemeral                  = 6;
  string               approval_prompt            = 7;
  repeated string      approval_options           = 8;
  // Default: 300.0 seconds (5 minutes).
  optional double      approval_timeout           = 9;
  ApprovalDefault      approval_default           = 10;
  bool                 suppress_output            = 11;
  string               user_message               = 12;
  UserMessageLevel     user_message_level         = 13;
  string               user_message_source        = 14;
  bool                 append_to_last_tool_result = 15;
}

message ModelInfo {
  string          id                = 1;
  string          display_name      = 2;
  int32           context_window    = 3;
  int32           max_output_tokens = 4;
  repeated string capabilities      = 5;
  string          defaults_json     = 6;
}

message ProviderInfo {
  string                 id                 = 1;
  string                 display_name       = 2;
  repeated string        credential_env_vars = 3;
  repeated string        capabilities       = 4;
  string                 defaults_json      = 5;
  repeated ConfigField   config_fields      = 6;
}

message ApprovalRequest {
  string tool_name      = 1;
  string action         = 2;
  string details_json   = 3;
  string risk_level     = 4;
  optional double timeout = 5;
}

message ApprovalResponse {
  bool   approved = 1;
  string reason   = 2;
  bool   remember = 3;
}

// ---------------------------------------------------------------------------
// Service-specific request/response messages
// ---------------------------------------------------------------------------

message ListModelsResponse {
  repeated ModelInfo models = 1;
}

message ParseToolCallsResponse {
  repeated ToolCallMessage tool_calls = 1;
}

message OrchestratorExecuteRequest {
  string prompt     = 1;
  string session_id = 2;
}

message OrchestratorExecuteResponse {
  string response = 1;
  string error    = 2;
}

message AddMessageRequest {
  Message message = 1;
}

message GetMessagesResponse {
  repeated Message messages = 1;
}

message GetMessagesForRequestParams {
  int32  token_budget  = 1;
  string provider_name = 2;
}

message SetMessagesRequest {
  repeated Message messages = 1;
}

message HookHandleRequest {
  string event     = 1;
  string data_json = 2;
}

// GetSubscriptions: allows a hook module to declare which events it handles.
message GetSubscriptionsRequest {
  string config_json = 1;
}
message GetSubscriptionsResponse {
  repeated EventSubscription subscriptions = 1;
}
message EventSubscription {
  string event    = 1;
  int32  priority = 2;
  string name     = 3;
}

// ---------------------------------------------------------------------------
// Module services
// ---------------------------------------------------------------------------

// Provider module contract — LLM completions in any language.
service ProviderService {
  rpc GetInfo(Empty) returns (ProviderInfo);
  rpc ListModels(Empty) returns (ListModelsResponse);
  rpc Complete(ChatRequest) returns (ChatResponse);
  rpc CompleteStreaming(ChatRequest) returns (stream ChatResponse);
  rpc ParseToolCalls(ChatResponse) returns (ParseToolCallsResponse);
}

// Orchestrator module contract — high-level prompt execution.
service OrchestratorService {
  rpc Execute(OrchestratorExecuteRequest) returns (OrchestratorExecuteResponse);
}

// Context module contract — conversation message management.
service ContextService {
  rpc AddMessage(AddMessageRequest) returns (Empty);
  rpc GetMessages(Empty) returns (GetMessagesResponse);
  rpc GetMessagesForRequest(GetMessagesForRequestParams) returns (GetMessagesResponse);
  rpc SetMessages(SetMessagesRequest) returns (Empty);
  rpc Clear(Empty) returns (Empty);
}

// Hook module contract — event interception.
service HookService {
  rpc Handle(HookHandleRequest) returns (HookResult);

  // Return the event subscriptions this hook wants to receive.
  // The host calls this at mount time and registers the subscriptions itself.
  // A future RegisterHook RPC on KernelService will allow bidirectional
  // registration where the module pushes subscriptions to the kernel.
  rpc GetSubscriptions(GetSubscriptionsRequest) returns (GetSubscriptionsResponse);
}

// Approval module contract — human-in-the-loop approval.
service ApprovalService {
  rpc RequestApproval(ApprovalRequest) returns (ApprovalResponse);
}

// ---------------------------------------------------------------------------
// KernelService — hub service for out-of-process module callbacks
// ---------------------------------------------------------------------------

// Hosted by the Rust kernel, called by out-of-process modules to access
// kernel capabilities: completions, tools, hooks, messages, and modules.

message CompleteWithProviderRequest {
  string provider_name = 1;
  ChatRequest request   = 2;
}

message ExecuteToolRequest {
  string tool_name  = 1;
  string input_json = 2;
}

message EmitHookRequest {
  string event     = 1;
  string data_json = 2;
}

message EmitHookAndCollectRequest {
  string event           = 1;
  string data_json       = 2;
  double timeout_seconds = 3;
}

message EmitHookAndCollectResponse {
  repeated string responses_json = 1;
}

message GetMessagesRequest {
  string session_id = 1;
}

message KernelAddMessageRequest {
  string session_id = 1;
  Message message   = 2;
}

message GetMountedModuleRequest {
  string module_name    = 1;
  ModuleType module_type = 2;
}

message GetMountedModuleResponse {
  bool found       = 1;
  ModuleInfo info  = 2;
}

message RegisterCapabilityRequest {
  string name       = 1;
  string value_json = 2;
}

message GetCapabilityRequest {
  string name = 1;
}

message GetCapabilityResponse {
  bool found       = 1;
  string value_json = 2;
}

service KernelService {
  // LLM completions via a named provider.
  rpc CompleteWithProvider(CompleteWithProviderRequest) returns (ChatResponse);
  rpc CompleteWithProviderStreaming(CompleteWithProviderRequest) returns (stream ChatResponse);

  // Tool execution.
  rpc ExecuteTool(ExecuteToolRequest) returns (ToolResult);

  // Hook emission.
  rpc EmitHook(EmitHookRequest) returns (HookResult);
  rpc EmitHookAndCollect(EmitHookAndCollectRequest) returns (EmitHookAndCollectResponse);

  // Conversation message access.
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
  rpc AddMessage(KernelAddMessageRequest) returns (Empty);

  // Module registry queries.
  rpc GetMountedModule(GetMountedModuleRequest) returns (GetMountedModuleResponse);

  // Capability registration and lookup.
  rpc RegisterCapability(RegisterCapabilityRequest) returns (Empty);
  rpc GetCapability(GetCapabilityRequest) returns (GetCapabilityResponse);
}

// ---------------------------------------------------------------------------
// ModuleLifecycle — every gRPC module implements this service
// ---------------------------------------------------------------------------

// Universal lifecycle contract for all out-of-process modules.
// Mount is called once at startup; Cleanup before shutdown.
service ModuleLifecycle {
  rpc Mount(MountRequest) returns (MountResponse);
  rpc Cleanup(Empty) returns (Empty);
  rpc HealthCheck(Empty) returns (HealthCheckResponse);
  rpc GetModuleInfo(Empty) returns (ModuleInfo);
}
