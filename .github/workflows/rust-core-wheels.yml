name: Build Wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: PyO3/maturin-action@v1
        with:
          args: --profile dist --out dist --interpreter python3.11
          manylinux: auto
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  build-linux-aarch64:
    name: Build wheels (Linux aarch64)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64-unknown-linux-gnu
          args: --profile dist --out dist --interpreter python3.11
          manylinux: auto
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-aarch64
          path: dist/*.whl

  build-macos-x86_64:
    name: Build wheels (macOS x86_64)
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64-apple-darwin
          args: --profile dist --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-x86_64
          path: dist/*.whl

  build-windows-arm64:
    name: Build wheels (Windows arm64)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64-pc-windows-msvc
          args: --profile dist --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-arm64
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-wheels, build-linux-aarch64, build-macos-x86_64, build-windows-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: 'wheels-*'
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
